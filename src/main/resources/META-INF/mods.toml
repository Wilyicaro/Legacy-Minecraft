modLoader = "javafml"
loaderVersion = "[47,)"
license="${mod_license}"
issueTrackerURL="${mod_issues}"

[[mods]]
modId="${mod_id}"
version="${version}"
displayName="${mod_name}"
displayURL="${mod_source}"
logoFile="logo.png"
authors="${mod_authors}"
description="${mod_description}"
credits="${mod_credits}"

[[mixins]]
config="${mod_id}.mixins.json"

[[mixins]]
config="consoleskins.mixins.json"

[[mixins]]
config="consoleskins.client.mixins.json"

[[mixins]]
config="cpm.mixins.json"

[[mixins]]
config="cpm.mixins.shared.json"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "[${mc_version_range}]"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "factory_api"
mandatory = true
versionRange = "[${factory_api_version},)"
ordering = "AFTER"
side = "BOTH"